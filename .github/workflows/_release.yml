name: _release

on:
  workflow_call:
    inputs:
      releaseType:
        description: 'Release type (MAJOR, MINOR, PATCH)'
        required: true
        type: string
    secrets:
      RELEASE_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  make-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch for release type
        shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
          TYPE: ${{ inputs.releaseType }}
        run: |
          case "$TYPE" in
            MAJOR|MINOR)
              if [ "$BRANCH" != "master" ]; then
                echo "::error::$TYPE release must be run from 'master', got '$BRANCH'"
                exit 1
              fi
              ;;
            PATCH)
              if [[ "$BRANCH" != release/* ]]; then
                echo "::error::PATCH release must be run from a 'release/*' branch, got '$BRANCH'"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unknown release type '$TYPE'"
              exit 1
              ;;
          esac

      - name: Validate RELEASE_TOKEN is set
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::RELEASE_TOKEN secret is not set. Create a PAT with 'contents: write' and add it as the RELEASE_TOKEN repository secret."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make release
        env:
          RELEASE_TYPE: ${{ inputs.releaseType }}
          VERCRAFT_BRANCH: ${{ github.ref_name }}
        run: ./gradlew -p build-logic makeRelease -PreleaseType="$RELEASE_TYPE"
