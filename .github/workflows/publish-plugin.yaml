name: Publish Plugin to Portal

on:
  push:
    tags:
      - '*'

jobs:
  gradle:
    runs-on: ubuntu-latest
    env:
      GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
      GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Gradle Caches
        uses: gradle/actions/setup-gradle@v5
      - name: Resolve release branch from tag
        id: vercraft
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="${VERSION%.*}"
          echo "branch=release/${MAJOR_MINOR}.x" >> "$GITHUB_OUTPUT"
      - name: Publish on Plugin Portal
        run: ./gradlew -p build-logic publishPlugins
        if: success()
        env:
          CI_COMMIT_REF_NAME: ${{ steps.vercraft.outputs.branch }}
